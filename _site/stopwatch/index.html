<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Stopwatch — Free Stopwatch Timer | Timerrapp</title>
<meta name="description" content="Free online stopwatch with lap times. Tracks time to the millisecond. No download needed — works right in your browser.">
<link rel="canonical" href="https://timerrapp.com/stopwatch/">
<meta name="google-site-verification" content="l7y9RLTGEQ9oIRfnLf-2oNWYb8G-ovdbaUHeK7o4ko8" />
<link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --surface2: #1c1c26;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f0ede8;
  --muted: rgba(240,237,232,0.45);
  --hint: rgba(240,237,232,0.2);
  --accent: #c8a96e;
  --danger: #e05c5c;
  --success: #5ce0a0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url('/assets/mountain-1.webp');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  opacity: 0.2;
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
  z-index: 0;
}
header {
  position: relative; z-index: 10;
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.25rem 2.5rem;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  background: rgba(10,10,15,0.6);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}
.logo {
  font-family: 'Instrument Serif', serif;
  font-size: 1.85rem;
  color: var(--text);
  text-decoration: none;
}
.logo span { color: var(--accent); font-style: italic; }
nav { display: flex; gap: 4px; }
nav a {
  color: var(--muted);
  text-decoration: none;
  padding: 6px 14px;
  border-radius: 100px;
  font-size: 0.85rem;
  border: 1px solid transparent;
  transition: all 0.2s;
}
nav a:hover { color: var(--text); border-color: var(--border2); }
nav a.active { color: var(--text); background: var(--surface2); border-color: var(--border2); }
main {
  position: relative; z-index: 1;
  flex: 1;
  max-width: 680px;
  width: 100%;
  margin: 0 auto;
  padding: 3rem 2rem 5rem;
  text-align: center;
}
.page-title {
  font-family: 'Instrument Serif', serif;
  font-size: 2.4rem;
  font-weight: 400;
  margin-bottom: 0.4rem;
}
.page-subtitle {
  color: var(--muted);
  font-size: 0.95rem;
  margin-bottom: 2.5rem;
}
/* Buttons */
.btn {
  padding: 0.9rem 2.2rem;
  border-radius: 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 1.05rem;
  cursor: pointer;
  font-weight: 500;
  border: none;
  transition: opacity 0.2s, border-color 0.2s;
  min-width: 120px;
}
.btn-primary { background: var(--accent); color: #0a0a0f; }
.btn-primary:hover { opacity: 0.85; }
.btn-secondary { background: transparent; border: 1px solid var(--border2); color: var(--text); }
.btn-secondary:hover { border-color: rgba(255,255,255,0.3); }
.btn-danger { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
/* Inputs */
.input-field {
  width: 100%;
  max-width" 100%;
  box-sizing: border-box;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 10px;
  color: var(--text);
  padding: 0.75rem 1rem;
  font-family: 'DM Mono', monospace;
  font-size: 1rem;
  outline: none;
  transition: border-color 0.2s;
  text-align: center;
}
.input-field:focus { border-color: var(--accent); }
.field-label {
  display: block;
  font-size: 0.72rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 6px;
  text-align: center;
}
/* Sound picker */
.sound-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin: 1.25rem 0;
  flex-wrap: wrap;
}
.sound-row label { font-size: 0.8rem; color: var(--muted); }
.sound-select {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 8px;
  color: var(--text);
  padding: 6px 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem;
  outline: none;
  cursor: pointer;
}
.sound-select:focus { border-color: var(--accent); }
.sound-select option { background: var(--surface2); }
.btn-test {
  padding: 6px 14px;
  border-radius: 8px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--muted);
  font-size: 0.8rem;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.15s;
}
.btn-test:hover { border-color: var(--accent); color: var(--accent); }
/* Chips */
.chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 1.5rem; }
.chip {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 5px 16px;
  font-size: 0.82rem;
  color: var(--muted);
  cursor: pointer;
  font-family: 'DM Mono', monospace;
  transition: all 0.15s;
}
.chip:hover { border-color: var(--accent); color: var(--accent); }

.glass {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  transition: background 0.2s, border-color 0.2s;
}
.glass:hover {
  background: rgba(255,255,255,0.09);
  border-color: rgba(200,169,110,0.5);
}

/* Control row */
.controls { display: flex; gap: 10px; justify-content: center; margin-top: 1.5rem; flex-wrap: wrap; }
/* Divider */
.divider { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }
/* Section label */
.section-label {
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--hint);
  margin-bottom: 1rem;
}
footer {
  position: relative; z-index: 1;
  text-align: center;
  padding: 1.5rem;
  font-size: 0.78rem;
  color: var(--hint);
  border-top: 1px solid var(--border);
}
footer a { color: var(--hint); text-decoration: none; }
footer a:hover { color: var(--accent); }

* { max-width: 100%; }
body { overflow-x: hidden; }

@media (max-width: 600px) {
  header {
    padding: 0.9rem 1rem;
    flex-direction: column;
    align-items: center;
    gap: 0.6rem;
  }
  nav {
    width: 100%;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  nav::-webkit-scrollbar { display: none; }
  nav a { padding: 4px 10px; font-size: 0.75rem; white-space: nowrap; }
  main { padding: 2rem 1rem 3rem; }
  .page-title { font-size: 1.8rem; }
  .controls { gap: 8px; }
  .btn { padding: 0.8rem 1.4rem; font-size: 0.95rem; min-width: 100px; }
}

/* Shared sound engine */
</style>

<body>
<header>
  <a href="/" class="logo">Timerr<span>app</span></a>
  <nav>
    <a href="/" >Clock</a>
    <a href="/alarm/" >Alarm</a>
    <a href="/timer/" >Timer</a>
    <a href="/stopwatch/" class="active">Stopwatch</a>
    <a href="/pomodoro/" >Pomodoro</a>
  </nav>
</header>
<main>
  
<h1 class="page-title">Stopwatch</h1>
<p class="page-subtitle">Millisecond precision with lap tracking.</p>

<div style="font-family:'DM Mono',monospace;font-size:clamp(3rem,12vw,6rem);font-weight:300;letter-spacing:-0.02em;margin-bottom:0.5rem;" id="swDisplay">00:00.000</div>

<div style="font-size:0.78rem;color:var(--muted);margin-bottom:2rem;min-height:1.2em;" id="swLapTime"></div>

<div class="controls" style="margin-top:0;">
  <button class="btn btn-primary" id="swStartBtn" onclick="toggleSW()">Start</button>
  <button class="btn btn-secondary" id="swLapBtn" onclick="lapSW()" disabled style="opacity:0.4;">Lap</button>
  <button class="btn btn-secondary" onclick="resetSW()">Reset</button>
</div>
<div style="margin-top:1rem;font-size:0.75rem;color:var(--hint);">Press <kbd style="background:var(--surface2);border:1px solid var(--border2);border-radius:4px;padding:1px 6px;font-family:'DM Mono',monospace;font-size:0.72rem;">Space</kbd> to start or pause</div>

<div id="swLaps" style="margin-top:2rem;width:100%;"></div>

<script>
let swStart = 0, swElapsed = 0, swRunning = false, swIv = null;
let laps = [], lapElapseds = [];

function fmt(ms) {
  const min = Math.floor(ms/60000);
  const sec = Math.floor((ms%60000)/1000);
  const ms3 = ms%1000;
  return String(min).padStart(2,'0')+':'+String(sec).padStart(2,'0')+'.'+String(ms3).padStart(3,'0');
}

function toggleSW() {
  if (!swRunning) {
    swStart = Date.now() - swElapsed;
    swRunning = true;
    document.getElementById('swStartBtn').textContent = 'Pause';
    document.getElementById('swLapBtn').disabled = false;
    document.getElementById('swLapBtn').style.opacity = '1';
    swIv = setInterval(() => {
      swElapsed = Date.now() - swStart;
      document.getElementById('swDisplay').textContent = fmt(swElapsed);
      if (laps.length > 0) {
        const lapCurrent = swElapsed - lapElapseds[lapElapseds.length-1];
        document.getElementById('swLapTime').textContent = 'Current lap: ' + fmt(lapCurrent);
      }
    }, 33);
  } else {
    swRunning = false;
    swElapsed = Date.now() - swStart;
    clearInterval(swIv);
    document.getElementById('swStartBtn').textContent = 'Resume';
  }
}

function lapSW() {
  const total = Date.now() - swStart;
  const prev = lapElapseds.length > 0 ? lapElapseds[lapElapseds.length-1] : 0;
  lapElapseds.push(total);
  laps.push(total - prev);
  renderLaps();
}

function resetSW() {
  clearInterval(swIv);
  swRunning = false; swElapsed = 0; laps = []; lapElapseds = [];
  document.getElementById('swDisplay').textContent = '00:00.000';
  document.getElementById('swLapTime').textContent = '';
  document.getElementById('swStartBtn').textContent = 'Start';
  document.getElementById('swLapBtn').disabled = true;
  document.getElementById('swLapBtn').style.opacity = '0.4';
  document.getElementById('swLaps').innerHTML = '';
}

function renderLaps() {
  const fastest = laps.length > 1 ? Math.min(...laps) : -1;
  const slowest = laps.length > 1 ? Math.max(...laps) : -1;
  document.getElementById('swLaps').innerHTML = `
    <div style="display:grid;grid-template-columns:auto 1fr 1fr;gap:0;width:100%;border-top:1px solid var(--border);">
      <div style="font-size:0.7rem;color:var(--hint);text-transform:uppercase;letter-spacing:0.08em;padding:8px 0;border-bottom:1px solid var(--border);">Lap</div>
      <div style="font-size:0.7rem;color:var(--hint);text-transform:uppercase;letter-spacing:0.08em;padding:8px 0;border-bottom:1px solid var(--border);text-align:center;">Lap time</div>
      <div style="font-size:0.7rem;color:var(--hint);text-transform:uppercase;letter-spacing:0.08em;padding:8px 0;border-bottom:1px solid var(--border);text-align:center;">Overall</div>
      ${[...laps].reverse().map((t,ri) => {
        const i = laps.length-1-ri;
        const color = t===fastest ? 'var(--success)' : t===slowest ? 'var(--danger)' : 'var(--text)';
        return `
          <div style="font-size:0.78rem;color:var(--hint);padding:10px 0;border-bottom:1px solid var(--border);">#${i+1}</div>
          <div style="font-family:'DM Mono',monospace;font-size:0.95rem;color:${color};padding:10px 0;border-bottom:1px solid var(--border);text-align:center;">${fmt(t)}</div>
          <div style="font-family:'DM Mono',monospace;font-size:0.95rem;color:var(--muted);padding:10px 0;border-bottom:1px solid var(--border);text-align:center;">${fmt(lapElapseds[i])}</div>`;
      }).join('')}
    </div>`;
}

// Tab title
function updateTabTitle() {
  if (swRunning) {
    document.title = fmt(swElapsed) + ' – Timerrapp';
  } else {
    document.title = 'Online Stopwatch — Free Stopwatch Timer | Timerrapp';
  }
}
setInterval(updateTabTitle, 100);

// Space to Start/Pause
document.addEventListener('keydown', function(e) {
  if (e.code !== 'Space') return;
  const tag = document.activeElement.tagName.toLowerCase();
  if (tag === 'input' || tag === 'textarea' || tag === 'select') return;
  e.preventDefault();
  toggleSW();
});
</script>
</main>

</footer>
<script>
function playSound(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const t = ctx.currentTime;
    if (type === 'beep') {
      tone(ctx, 880, t, 0.5, 'sine');
    } else if (type === 'digital') {
      tone(ctx, 1047, t, 0.15, 'square');
      tone(ctx, 1047, t+0.2, 0.15, 'square');
      tone(ctx, 1047, t+0.4, 0.15, 'square');
    } else if (type === 'bells') {
      tone(ctx, 1318, t, 0.6, 'sine');
      tone(ctx, 1568, t+0.15, 0.6, 'sine');
      tone(ctx, 2093, t+0.3, 0.8, 'sine');
    } else if (type === 'chime') {
      [523, 659, 784, 1047].forEach((f, i) => tone(ctx, f, t + i*0.18, 0.5, 'sine'));
    } else if (type === 'alarm') {
      for (let i = 0; i < 6; i++) {
        tone(ctx, i%2===0 ? 880 : 1100, t + i*0.18, 0.16, 'sawtooth');
      }
    }
  } catch(e) {}
}
function tone(ctx, freq, start, dur, type) {
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.frequency.value = freq; o.type = type;
  g.gain.setValueAtTime(0.25, start);
  g.gain.exponentialRampToValueAtTime(0.001, start + dur);
  o.start(start); o.stop(start + dur);
}
</script>
</body>
