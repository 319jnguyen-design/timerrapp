<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Alarm Clock — Free Alarm | Timerrapp</title>
<meta name="description" content="Free online alarm clock. Set an alarm for any time and get alerted right in your browser. No download needed.">
<link rel="canonical" href="https://timerrapp.com/alarm/">
<meta name="google-site-verification" content="l7y9RLTGEQ9oIRfnLf-2oNWYb8G-ovdbaUHeK7o4ko8" />
<link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --surface2: #1c1c26;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f0ede8;
  --muted: rgba(240,237,232,0.45);
  --hint: rgba(240,237,232,0.2);
  --accent: #c8a96e;
  --danger: #e05c5c;
  --success: #5ce0a0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url('/assets/mountain-1.webp');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  opacity: 0.2;
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
  z-index: 0;
}
header {
  position: relative; z-index: 10;
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.25rem 2.5rem;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  background: rgba(10,10,15,0.6);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}
.logo {
  font-family: 'Instrument Serif', serif;
  font-size: 1.85rem;
  color: var(--text);
  text-decoration: none;
}
.logo span { color: var(--accent); font-style: italic; }
nav { display: flex; gap: 4px; }
nav a {
  color: var(--muted);
  text-decoration: none;
  padding: 6px 14px;
  border-radius: 100px;
  font-size: 0.85rem;
  border: 1px solid transparent;
  transition: all 0.2s;
}
nav a:hover {
  color: var(--text);
  background: rgba(255,255,255,0.07);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-color: rgba(255,255,255,0.12);
}
nav a.active {
  color: var(--text);
  background: rgba(255,255,255,0.07);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-color: rgba(255,255,255,0.12);
}
main {
  position: relative; z-index: 1;
  flex: 1;
  max-width: 680px;
  width: 100%;
  margin: 0 auto;
  padding: 3rem 2rem 5rem;
  text-align: center;
}
.page-title {
  font-family: 'Instrument Serif', serif;
  font-size: 2.4rem;
  font-weight: 400;
  margin-bottom: 0.4rem;
}
.page-subtitle {
  color: var(--muted);
  font-size: 0.95rem;
  margin-bottom: 2.5rem;
}
/* Buttons */
.btn {
  padding: 0.9rem 2.2rem;
  border-radius: 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 1.05rem;
  cursor: pointer;
  font-weight: 500;
  border: none;
  transition: opacity 0.2s, border-color 0.2s;
  min-width: 120px;
}
.btn-primary { background: var(--accent); color: #0a0a0f; }
.btn-primary:hover { opacity: 0.85; }
.btn-secondary {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(96,96,96,0.1);
  color: var(--text);
}
.btn-secondary:hover {
  background: rgba(255,255,255,0.09);
}
.btn-danger { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
/* Inputs */
.input-field {
  width: 100%;
  max-width" 100%;
  box-sizing: border-box;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 10px;
  color: var(--text);
  padding: 0.75rem 1rem;
  font-family: 'DM Mono', monospace;
  font-size: 1rem;
  outline: none;
  transition: border-color 0.2s;
  text-align: center;
}
.input-field:focus { border-color: var(--accent); }
.field-label {
  display: block;
  font-size: 0.72rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 6px;
  text-align: center;
}
/* Sound picker */
.sound-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin: 1.25rem 0;
  flex-wrap: wrap;
}
.sound-row label { font-size: 0.8rem; color: var(--muted); }
.sound-select {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 8px;
  color: var(--text);
  padding: 6px 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem;
  outline: none;
  cursor: pointer;
}
.sound-select:focus { border-color: var(--accent); }
.sound-select option { background: var(--surface2); }
.btn-test {
  padding: 6px 14px;
  border-radius: 8px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--muted);
  font-size: 0.8rem;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.15s;
}
.btn-test:hover { border-color: var(--accent); color: var(--accent); }
/* Chips */
.chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 1.5rem; }
.chip {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 5px 16px;
  font-size: 0.82rem;
  color: var(--muted);
  cursor: pointer;
  font-family: 'DM Mono', monospace;
  transition: all 0.15s;
}
.chip:hover { border-color: var(--accent); color: var(--accent); }

.glass {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(96,96,96,0.1);
  border-radius: 16px;
  transition: background 0.2s, border-color 0.2s;
}
.glass:hover {
  background: rgba(255,255,255,0.09);
}

/* Control row */
.controls { display: flex; gap: 10px; justify-content: center; margin-top: 1.5rem; flex-wrap: wrap; }
/* Divider */
.divider { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }
/* Section label */
.section-label {
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--hint);
  margin-bottom: 1rem;
}
footer {
  position: relative; z-index: 1;
  text-align: center;
  padding: 1.5rem;
  font-size: 0.78rem;
  color: var(--hint);
  border-top: 1px solid var(--border);
}
footer a { color: var(--hint); text-decoration: none; }
footer a:hover { color: var(--accent); }

* { max-width: 100%; }
body { overflow-x: hidden; }

@media (max-width: 600px) {
  header {
    padding: 0.9rem 1rem;
    flex-direction: column;
    align-items: center;
    gap: 0.6rem;
  }
  .desktop-only { display: none; }
  nav {
    width: 100%;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  nav::-webkit-scrollbar { display: none; }
  nav a { padding: 4px 10px; font-size: 0.75rem; white-space: nowrap; }
  main { padding: 2rem 1rem 3rem; }
  .page-title { font-size: 1.8rem; }
  .controls { gap: 8px; }
  .btn { padding: 0.8rem 1.4rem; font-size: 0.95rem; min-width: 100px; }
}

/* Shared sound engine */
</style>
</head>
<body>
<header>
  <a href="/" class="logo">Timerr<span>app</span></a>
  <nav>
    <a href="/" >Clock</a>
    <a href="/alarm/" class="active">Alarm</a>
    <a href="/timer/" >Timer</a>
    <a href="/stopwatch/" >Stopwatch</a>
    <a href="/pomodoro/" >Pomodoro</a>
<a href="/world-clock/" >World Clock</a>
  </nav>
</header>
<main>
  
<h1 class="page-title">Alarm Clock</h1>
<p class="page-subtitle">Set an alarm and get alerted right in your browser.</p>

<div style="display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:12px;">
  <div>
    <label class="field-label">Time</label>
    <input type="time" id="alarmTime" value="07:00" class="input-field" style="color-scheme:dark;width: 100%;max-width:100%;">
  </div>
  <div>
    <label class="field-label">Label</label>
    <input type="text" id="alarmLabel" placeholder="Wake up..." class="input-field" style="font-family:'DM Sans',sans-serif;">
  </div>
</div>

<div class="sound-row">
  <label>Sound</label>
  <select id="alarmSound" class="sound-select">
    <option value="bells">Bells</option>
    <option value="chime">Chime</option>
    <option value="beep" selected>Beep</option>
    <option value="digital">Digital</option>
    <option value="alarm">Alarm</option>
  </select>
  <button class="btn-test" onclick="playSound(document.getElementById('alarmSound').value)">▶ Test</button>
</div>

<button onclick="addAlarm()" class="btn btn-primary" style="width:100%;margin-top:4px;">Set Alarm</button>

<div id="alarmList" style="margin-top:1.5rem;"></div>

<hr class="divider">
<div class="section-label">Popular alarm times</div>
<div class="chips" id="quickChips"></div>

<!-- Alarm modal -->
<div id="alarmModal" style="display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.85);align-items:center;justify-content:center;">
  <div style="background:var(--surface);border:1px solid var(--accent);border-radius:16px;padding:2.5rem 2rem;text-align:center;max-width:340px;width:90%;animation:fadeUp 0.3s ease;">
    <div id="modalIcon" style="font-size:2.5rem;margin-bottom:1rem;">🔔</div>
    <div style="font-family:'Instrument Serif',serif;font-size:1.8rem;margin-bottom:0.4rem;" id="modalTitle">Alarm</div>
    <div style="font-family:'DM Mono',monospace;font-size:2.2rem;font-weight:300;color:var(--accent);margin-bottom:0.5rem;" id="modalTime">--:--</div>
    <div style="font-size:0.85rem;color:var(--muted);margin-bottom:2rem;" id="modalLabel"></div>
    <button onclick="dismissModal()" class="btn btn-primary" style="width:100%;padding:0.9rem;">Dismiss</button>
  </div>
</div>

<style>
@keyframes fadeUp {
  from { opacity:0; transform:translateY(20px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes bellRing {
  0%,100% { transform:rotate(-15deg); }
  50%     { transform:rotate(15deg); }
}
#modalIcon { display:inline-block; }
#alarmModal.show { display:flex !important; }
#alarmModal.ringing #modalIcon { animation:bellRing 0.4s ease infinite; }
</style>

<script>
let alarms = JSON.parse(localStorage.getItem('tc_alarms') || '[]');
let ringInterval = null;
let audioCtx = null;

const quickTimes = [
  {label:'5:00 AM',h:5,m:0},{label:'5:30 AM',h:5,m:30},
  {label:'6:00 AM',h:6,m:0},{label:'6:30 AM',h:6,m:30},
  {label:'7:00 AM',h:7,m:0},{label:'7:30 AM',h:7,m:30},
  {label:'8:00 AM',h:8,m:0},{label:'8:30 AM',h:8,m:30},
  {label:'9:00 AM',h:9,m:0},{label:'10:00 AM',h:10,m:0}
];
const chips = document.getElementById('quickChips');
quickTimes.forEach(t => {
  const c = document.createElement('div');
  c.className = 'chip';
  c.textContent = t.label;
  c.onclick = () => {
    document.getElementById('alarmTime').value = String(t.h).padStart(2,'0')+':'+String(t.m).padStart(2,'0');
    document.getElementById('alarmLabel').value = 'Wake up';
    addAlarm();
  };
  chips.appendChild(c);
});

function addAlarm() {
  const val = document.getElementById('alarmTime').value;
  if (!val) return;
  const label = document.getElementById('alarmLabel').value || 'Alarm';
  const sound = document.getElementById('alarmSound').value;
  const [h, m] = val.split(':').map(Number);
  const ampm = h >= 12 ? 'PM' : 'AM';
  const h12 = h % 12 || 12;
  const display = String(h12).padStart(2,'0')+':'+String(m).padStart(2,'0')+' '+ampm;
  alarms.push({ h, m, label, sound, active:true, id:Date.now(), display });
  localStorage.setItem('tc_alarms', JSON.stringify(alarms));
  renderAlarms();
  document.getElementById('alarmLabel').value = '';
}

function renderAlarms() {
  const list = document.getElementById('alarmList');
  if (!alarms.length) {
    list.innerHTML = '<div style="padding:2.5rem;color:var(--muted);font-size:0.9rem;border:1px dashed var(--border);border-radius:12px;text-align:center;">No alarms set yet</div>';
    return;
  }
  list.innerHTML = alarms.map((al,i) => `
    <div style="display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid ${al.active ? 'var(--accent)' : 'var(--border)'};border-radius:12px;padding:1rem 1.25rem;margin-bottom:10px;">
      <div style="text-align:left;">
        <div style="font-family:'DM Mono',monospace;font-size:1.6rem;font-weight:300;">${al.display}</div>
        <div style="font-size:0.78rem;color:var(--muted);margin-top:2px;">${al.label} · ${al.sound}</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <div onclick="toggleAlarm(${i})" style="width:40px;height:22px;border-radius:100px;border:1px solid ${al.active ? 'var(--accent)' : 'var(--border2)'};background:${al.active ? 'var(--accent)' : 'transparent'};cursor:pointer;position:relative;transition:all 0.2s;">
          <div style="position:absolute;top:2px;${al.active ? 'right:2px' : 'left:2px'};width:16px;height:16px;border-radius:50%;background:${al.active ? '#0a0a0f' : 'var(--muted)'};transition:all 0.2s;"></div>
        </div>
        <button onclick="deleteAlarm(${i})" class="btn btn-danger" style="padding:5px 12px;font-size:0.8rem;">Delete</button>
      </div>
    </div>`).join('');
}

function toggleAlarm(i) {
  alarms[i].active = !alarms[i].active;
  localStorage.setItem('tc_alarms', JSON.stringify(alarms));
  renderAlarms();
}
function deleteAlarm(i) {
  alarms.splice(i,1);
  localStorage.setItem('tc_alarms', JSON.stringify(alarms));
  renderAlarms();
}

function checkAlarms() {
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
  if (s !== 0) return;
  alarms.forEach(al => {
    if (al.active && al.h === h && al.m === m) fireAlarm(al);
  });
}

function fireAlarm(al) {
  document.getElementById('modalTitle').textContent = al.label;
  document.getElementById('modalTime').textContent = al.display;
  document.getElementById('modalLabel').textContent = 'Your alarm is ringing!';
  const modal = document.getElementById('alarmModal');
  modal.classList.add('show','ringing');
  startLoopingSound(al.sound || 'beep');
}

function dismissModal() {
  const modal = document.getElementById('alarmModal');
  modal.classList.remove('show','ringing');
  stopLoopingSound();
}

function startLoopingSound(sound) {
  stopLoopingSound();
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  function fireNote() {
    const freqs = {
      beep:[880], digital:[1047,1047,1047],
      bells:[1318,1568,2093], chime:[523,659,784,1047],
      alarm:[880,1100,880,1100,880,1100]
    };
    const gaps = {
      beep:[0], digital:[0,0.2,0.4],
      bells:[0,0.15,0.3], chime:[0,0.18,0.36,0.54],
      alarm:[0,0.18,0.36,0.54,0.72,0.90]
    };
    const t = audioCtx.currentTime;
    (freqs[sound]||freqs.beep).forEach((f,i) => {
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.frequency.value = f; o.type = 'sine';
      const st = t+(gaps[sound]||[0])[i];
      g.gain.setValueAtTime(0.3, st);
      g.gain.exponentialRampToValueAtTime(0.001, st+0.6);
      o.start(st); o.stop(st+0.6);
    });
  }
  fireNote();
  ringInterval = setInterval(fireNote, 2000);
}

function stopLoopingSound() {
  clearInterval(ringInterval);
  ringInterval = null;
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
}

setInterval(checkAlarms, 1000);
renderAlarms();
</script>
</main>
<footer>
  <p>© 2026 Timerrapp.com &nbsp;·&nbsp; <a href="/about/">About</a></p>
</footer>
<script>
function playSound(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const t = ctx.currentTime;
    if (type === 'beep') {
      tone(ctx, 880, t, 0.5, 'sine');
    } else if (type === 'digital') {
      tone(ctx, 1047, t, 0.15, 'square');
      tone(ctx, 1047, t+0.2, 0.15, 'square');
      tone(ctx, 1047, t+0.4, 0.15, 'square');
    } else if (type === 'bells') {
      tone(ctx, 1318, t, 0.6, 'sine');
      tone(ctx, 1568, t+0.15, 0.6, 'sine');
      tone(ctx, 2093, t+0.3, 0.8, 'sine');
    } else if (type === 'chime') {
      [523, 659, 784, 1047].forEach((f, i) => tone(ctx, f, t + i*0.18, 0.5, 'sine'));
    } else if (type === 'alarm') {
      for (let i = 0; i < 6; i++) {
        tone(ctx, i%2===0 ? 880 : 1100, t + i*0.18, 0.16, 'sawtooth');
      }
    }
  } catch(e) {}
}
function tone(ctx, freq, start, dur, type) {
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.frequency.value = freq; o.type = type;
  g.gain.setValueAtTime(0.25, start);
  g.gain.exponentialRampToValueAtTime(0.001, start + dur);
  o.start(start); o.stop(start + dur);
}
</script>
</body>
