<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Timer — Free Countdown Timer | Timerrapp</title>
<meta name="description" content="Free online countdown timer. Set a timer for any duration and get alerted in your browser. No download needed.">
<link rel="canonical" href="https://timerrapp.com/timer/">
<meta name="google-site-verification" content="l7y9RLTGEQ9oIRfnLf-2oNWYb8G-ovdbaUHeK7o4ko8" />
<link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --surface2: #1c1c26;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f0ede8;
  --muted: rgba(240,237,232,0.45);
  --hint: rgba(240,237,232,0.2);
  --accent: #c8a96e;
  --danger: #e05c5c;
  --success: #5ce0a0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url('/assets/mountain-1.webp');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  opacity: 0.2;
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
  z-index: 0;
}
header {
  position: relative; z-index: 10;
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.25rem 2.5rem;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  background: rgba(10,10,15,0.6);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}
.logo {
  font-family: 'Instrument Serif', serif;
  font-size: 1.85rem;
  color: var(--text);
  text-decoration: none;
}
.logo span { color: var(--accent); font-style: italic; }
nav { display: flex; gap: 4px; }
nav a {
  color: var(--muted);
  text-decoration: none;
  padding: 6px 14px;
  border-radius: 100px;
  font-size: 0.85rem;
  border: 1px solid transparent;
  transition: all 0.2s;
}
nav a:hover {
  color: var(--text);
  background: rgba(255,255,255,0.07);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-color: rgba(255,255,255,0.12);
}
nav a.active {
  color: var(--text);
  background: rgba(255,255,255,0.07);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-color: rgba(255,255,255,0.12);
}
main {
  position: relative; z-index: 1;
  flex: 1;
  max-width: 680px;
  width: 100%;
  margin: 0 auto;
  padding: 3rem 2rem 5rem;
  text-align: center;
}
.page-title {
  font-family: 'Instrument Serif', serif;
  font-size: 2.4rem;
  font-weight: 400;
  margin-bottom: 0.4rem;
}
.page-subtitle {
  color: var(--muted);
  font-size: 0.95rem;
  margin-bottom: 2.5rem;
}
/* Buttons */
.btn {
  padding: 0.9rem 2.2rem;
  border-radius: 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 1.05rem;
  cursor: pointer;
  font-weight: 500;
  border: none;
  transition: opacity 0.2s, border-color 0.2s;
  min-width: 120px;
}
.btn-primary { background: var(--accent); color: #0a0a0f; }
.btn-primary:hover { opacity: 0.85; }
.btn-secondary {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(96,96,96,0.1);
  color: var(--text);
}
.btn-secondary:hover {
  background: rgba(255,255,255,0.09);
}
.btn-danger { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
/* Inputs */
.input-field {
  width: 100%;
  max-width" 100%;
  box-sizing: border-box;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 10px;
  color: var(--text);
  padding: 0.75rem 1rem;
  font-family: 'DM Mono', monospace;
  font-size: 1rem;
  outline: none;
  transition: border-color 0.2s;
  text-align: center;
}
.input-field:focus { border-color: var(--accent); }
.field-label {
  display: block;
  font-size: 0.72rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 6px;
  text-align: center;
}
/* Sound picker */
.sound-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin: 1.25rem 0;
  flex-wrap: wrap;
}
.sound-row label { font-size: 0.8rem; color: var(--muted); }
.sound-select {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 8px;
  color: var(--text);
  padding: 6px 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem;
  outline: none;
  cursor: pointer;
}
.sound-select:focus { border-color: var(--accent); }
.sound-select option { background: var(--surface2); }
.btn-test {
  padding: 6px 14px;
  border-radius: 8px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--muted);
  font-size: 0.8rem;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.15s;
}
.btn-test:hover { border-color: var(--accent); color: var(--accent); }
/* Chips */
.chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 1.5rem; }
.chip {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 5px 16px;
  font-size: 0.82rem;
  color: var(--muted);
  cursor: pointer;
  font-family: 'DM Mono', monospace;
  transition: all 0.15s;
}
.chip:hover { border-color: var(--accent); color: var(--accent); }

.glass {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(96,96,96,0.1);
  border-radius: 16px;
  transition: background 0.2s, border-color 0.2s;
}
.glass:hover {
  background: rgba(255,255,255,0.09);
}

/* Control row */
.controls { display: flex; gap: 10px; justify-content: center; margin-top: 1.5rem; flex-wrap: wrap; }
/* Divider */
.divider { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }
/* Section label */
.section-label {
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--hint);
  margin-bottom: 1rem;
}
footer {
  position: relative; z-index: 1;
  text-align: center;
  padding: 1.5rem;
  font-size: 0.78rem;
  color: var(--hint);
  border-top: 1px solid var(--border);
}
footer a { color: var(--hint); text-decoration: none; }
footer a:hover { color: var(--accent); }

* { max-width: 100%; }
body { overflow-x: hidden; }

@media (max-width: 600px) {
  header {
    padding: 0.9rem 1rem;
    flex-direction: column;
    align-items: center;
    gap: 0.6rem;
  }
  nav {
    width: 100%;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  nav::-webkit-scrollbar { display: none; }
  nav a { padding: 4px 10px; font-size: 0.75rem; white-space: nowrap; }
  main { padding: 2rem 1rem 3rem; }
  .page-title { font-size: 1.8rem; }
  .controls { gap: 8px; }
  .btn { padding: 0.8rem 1.4rem; font-size: 0.95rem; min-width: 100px; }
}

/* Shared sound engine */
</style>
</head>
<body>
<header>
  <a href="/" class="logo">Timerr<span>app</span></a>
  <nav>
    <a href="/" >Clock</a>
    <a href="/alarm/" >Alarm</a>
    <a href="/timer/" class="active">Timer</a>
    <a href="/stopwatch/" >Stopwatch</a>
    <a href="/pomodoro/" >Pomodoro</a>
  </nav>
</header>
<main>
  
<h1 class="page-title">Online Timer</h1>
<p class="page-subtitle">Set a countdown for any duration.</p>

<div style="position:relative;display:inline-block;margin-bottom:1.5rem;">
  <svg width="220" height="220" viewBox="0 0 220 220">
    <circle cx="110" cy="110" r="96" fill="none" stroke="var(--surface2)" stroke-width="6"/>
    <circle id="timerRing" cx="110" cy="110" r="96" fill="none" stroke="var(--accent)"
      stroke-width="6" stroke-linecap="round"
      stroke-dasharray="603.2" stroke-dashoffset="0"
      transform="rotate(-90 110 110)"
      style="transition:stroke-dashoffset 1s linear,stroke 0.4s;"/>
    <circle id="timerDot" cx="110" cy="14" r="5" fill="var(--accent)" style="transition:fill 0.4s;"/>
  </svg>
  <div style="position:absolute;top:0;left:0;width:220px;height:220px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;">
    <div style="font-family:'DM Mono',monospace;font-size:2.6rem;font-weight:300;letter-spacing:-0.02em;" id="timerDisplay">00:00</div>
    <div style="font-size:0.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;" id="timerStatus">Ready</div>
  </div>
</div>

<div class="chips">
  <div class="chip" onclick="setTimer(60)">1 min</div>
  <div class="chip" onclick="setTimer(300)">5 min</div>
  <div class="chip" onclick="setTimer(600)">10 min</div>
  <div class="chip" onclick="setTimer(900)">15 min</div>
  <div class="chip" onclick="setTimer(1500)">25 min</div>
  <div class="chip" onclick="setTimer(1800)">30 min</div>
  <div class="chip" onclick="setTimer(3600)">1 hr</div>
</div>

<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem;">
  <div>
    <label class="field-label">Hours</label>
    <input type="number" id="timerH" min="0" max="99" value="0" class="input-field" style="font-size:1.4rem;">
  </div>
  <div>
    <label class="field-label">Minutes</label>
    <input type="number" id="timerM" min="0" max="59" value="5" class="input-field" style="font-size:1.4rem;">
  </div>
  <div>
    <label class="field-label">Seconds</label>
    <input type="number" id="timerS" min="0" max="59" value="0" class="input-field" style="font-size:1.4rem;">
  </div>
</div>

<div class="sound-row">
  <label>Sound</label>
  <select id="timerSound" class="sound-select">
    <option value="chime">Chime</option>
    <option value="bells">Bells</option>
    <option value="beep" selected>Beep</option>
    <option value="digital">Digital</option>
    <option value="alarm">Alarm</option>
  </select>
  <button class="btn-test" onclick="playSound(document.getElementById('timerSound').value)">▶ Test</button>
</div>

<div class="controls">
  <button class="btn btn-primary" id="timerStartBtn" onclick="toggleTimer()">Start</button>
  <button class="btn btn-secondary" onclick="resetTimer()">Reset</button>
</div>
<div style="margin-top:1rem;font-size:0.75rem;color:var(--hint);">Press <kbd style="background:var(--surface2);border:1px solid var(--border2);border-radius:4px;padding:1px 6px;font-family:'DM Mono',monospace;font-size:0.72rem;">Space</kbd> to start or pause</div>

<script>
const CIRC = 603.2;
let total = 0, remaining = 0, running = false, iv = null;

function setTimer(secs) {
  resetTimer();
  document.getElementById('timerH').value = Math.floor(secs/3600);
  document.getElementById('timerM').value = Math.floor((secs%3600)/60);
  document.getElementById('timerS').value = secs%60;
}

function getInput() {
  return (parseInt(document.getElementById('timerH').value)||0)*3600
       + (parseInt(document.getElementById('timerM').value)||0)*60
       + (parseInt(document.getElementById('timerS').value)||0);
}

function fmt(secs) {
  const h = Math.floor(secs/3600);
  const m = Math.floor((secs%3600)/60);
  const s = secs%60;
  if (h > 0) return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}

function updateRing(secs) {
  const pct = total > 0 ? secs/total : 1;
  const offset = CIRC*(1-pct);
  const isLow = secs <= 10 && secs > 0;
  const color = isLow ? 'var(--danger)' : 'var(--accent)';
  document.getElementById('timerRing').style.strokeDashoffset = offset;
  document.getElementById('timerRing').style.stroke = color;
  document.getElementById('timerDot').style.fill = color;
  document.getElementById('timerDisplay').style.color = isLow ? 'var(--danger)' : 'var(--text)';
  const angle = (1-pct)*360 - 90;
  const rad = angle*Math.PI/180;
  document.getElementById('timerDot').setAttribute('cx', (110+96*Math.cos(rad)).toFixed(2));
  document.getElementById('timerDot').setAttribute('cy', (110+96*Math.sin(rad)).toFixed(2));
  document.getElementById('timerDisplay').textContent = fmt(secs);
}

function toggleTimer() {
  if (!running) {
    if (remaining === 0) { total = getInput(); remaining = total; }
    if (remaining <= 0) return;
    running = true;
    document.getElementById('timerStartBtn').textContent = 'Pause';
    document.getElementById('timerStatus').textContent = 'Counting down';
    iv = setInterval(() => {
      remaining--;
      updateRing(remaining);
      if (remaining <= 0) {
        running = false; clearInterval(iv);
        document.getElementById('timerStartBtn').textContent = 'Start';
        document.getElementById('timerStatus').textContent = 'Done!';
        document.getElementById('timerRing').style.stroke = 'var(--success)';
        document.getElementById('timerDot').style.fill = 'var(--success)';
        playSound(document.getElementById('timerSound').value);
      }
    }, 1000);
  } else {
    running = false; clearInterval(iv);
    document.getElementById('timerStartBtn').textContent = 'Resume';
    document.getElementById('timerStatus').textContent = 'Paused';
  }
}

function resetTimer() {
  running = false; clearInterval(iv);
  remaining = 0; total = 0;
  document.getElementById('timerStartBtn').textContent = 'Start';
  document.getElementById('timerStatus').textContent = 'Ready';
  document.getElementById('timerDisplay').textContent = '00:00';
  document.getElementById('timerDisplay').style.color = 'var(--text)';
  document.getElementById('timerRing').style.strokeDashoffset = 0;
  document.getElementById('timerRing').style.stroke = 'var(--accent)';
  document.getElementById('timerDot').style.fill = 'var(--accent)';
  document.getElementById('timerDot').setAttribute('cx','110');
  document.getElementById('timerDot').setAttribute('cy','14');
}

// Tab title countdown
function updateTabTitle() {
  if (running && remaining > 0) {
    document.title = fmt(remaining) + ' – Timerrapp';
  } else {
    document.title = 'Online Timer — Free Countdown Timer | Timerrapp';
  }
}

// Patch toggleTimer to also update tab
const _origToggle = toggleTimer;
toggleTimer = function() {
  _origToggle();
  updateTabTitle();
}

// Update tab every second
setInterval(updateTabTitle, 1000);

// Keyboard shortcut — Space to Start/Pause
document.addEventListener('keydown', function(e) {
  if (e.code !== 'Space') return;
  const tag = document.activeElement.tagName.toLowerCase();
  if (tag === 'input' || tag === 'textarea' || tag === 'select') return;
  e.preventDefault();
  toggleTimer();
});
</script>
</main>

</footer>
<script>
function playSound(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const t = ctx.currentTime;
    if (type === 'beep') {
      tone(ctx, 880, t, 0.5, 'sine');
    } else if (type === 'digital') {
      tone(ctx, 1047, t, 0.15, 'square');
      tone(ctx, 1047, t+0.2, 0.15, 'square');
      tone(ctx, 1047, t+0.4, 0.15, 'square');
    } else if (type === 'bells') {
      tone(ctx, 1318, t, 0.6, 'sine');
      tone(ctx, 1568, t+0.15, 0.6, 'sine');
      tone(ctx, 2093, t+0.3, 0.8, 'sine');
    } else if (type === 'chime') {
      [523, 659, 784, 1047].forEach((f, i) => tone(ctx, f, t + i*0.18, 0.5, 'sine'));
    } else if (type === 'alarm') {
      for (let i = 0; i < 6; i++) {
        tone(ctx, i%2===0 ? 880 : 1100, t + i*0.18, 0.16, 'sawtooth');
      }
    }
  } catch(e) {}
}
function tone(ctx, freq, start, dur, type) {
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.frequency.value = freq; o.type = type;
  g.gain.setValueAtTime(0.25, start);
  g.gain.exponentialRampToValueAtTime(0.001, start + dur);
  o.start(start); o.stop(start + dur);
}
</script>
</body>
